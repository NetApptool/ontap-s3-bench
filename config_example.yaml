# ONTAP S3 性能测试配置模板
# 用法: python3 ontap_s3_bench.py --config config.yaml

# 客户名称 (报告标题用)
customer_name: "示例客户"

# ONTAP 存储
ontap_ip: "192.168.1.100"
ontap_user: "admin"
ontap_password: "password"

# S3 配置 (留空则自动探测/创建)
s3_lif_ip: ""
s3_bucket: "warp-bench"
s3_protocol: "http"
s3_port: 80

# 客户端 VM 列表
vms:
  - ip: "192.168.1.201"
    user: "root"
    password: "password"
  - ip: "192.168.1.202"
    user: "root"
    password: "password"
  - ip: "192.168.1.203"
    user: "root"
    password: "password"
  - ip: "192.168.1.204"
    user: "root"
    password: "password"

# 测试模式: quick / standard / full
test_mode: "standard"

# 工作目录
work_dir: "~/ontap_s3_test"
